name: Release workflow
run-name: ${{ github.actor }} triggered Release workflow

on:
  push:
    branches:
      - "release/*"

env:
  PROJECT_ID: ${{ secrets.PROJECT_ID }}
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SLACK_CHANNEL: ${{ secrets.GITHUBACTIONS_SLACK_CHANNEL }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}

jobs:
  build:
    name: Build and Push Release Image
    permissions:
      contents: write
      id-token: write

    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [preprod, prod]

    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from branch
        id: getversion
        run: |
          branch="${GITHUB_REF_NAME}"         # ex: release/1.23.4
          version="${branch#release/}"        # strip prefix
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Google Auth
        id: auth
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: "${{ secrets.WIF_PROVIDER }}"
          service_account: "${{ secrets.WIF_SERVICE_ACCOUNT }}"

      - name: Login to GAR
        id: garlogin
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.PROJECT_ID }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push Container
        id: build
        shell: bash
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          GAR_NAME: ${{ secrets.GAR_NAME }}
        run: |-
          #NOTE - there's no release for integrated?!
          docker build -f Dockerfile \
            -t '${{ env.GAR_LOCATION }}'-docker.pkg.dev/'${{ env.PROJECT_ID }}'/'${{ env.GAR_NAME }}'/${{ steps.getversion.outputs.version }}:${{ github.sha }} \
            -t '${{ env.GAR_LOCATION }}'-docker.pkg.dev/'${{ env.PROJECT_ID }}'/'${{ env.GAR_NAME }}'/${{ steps.getversion.outputs.version }}:latest \
            --build-arg API_BASE_URL="${{ vars.API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_LOGIN_URL="${{ vars.NEXT_PUBLIC_LOGIN_URL }}" \
            --build-arg NEXT_PUBLIC_USE_DEBUG_LOGS="${{ vars.NEXT_PUBLIC_USE_DEBUG_LOGS }}" \
            --build-arg NEXT_PUBLIC_TASK_URL="${{ vars.NEXT_PUBLIC_TASK_URL }}" \
            --build-arg NEXT_PUBLIC_USE_EXAMPLE_QUERY="${{ vars.NEXT_PUBLIC_USE_EXAMPLE_QUERY }}" \
            --build-arg APPLICATION_MODE="${{ vars.APPLICATION_MODE }}" \
            ./
            
          docker push --all-tags '${{ env.GAR_LOCATION }}'-docker.pkg.dev/'${{ env.PROJECT_ID }}'/'${{ env.GAR_NAME }}'/${{ steps.getversion.outputs.version }}

      - name: Run Notification
        id: runnotificationsent
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
          channel: ${{ env.SLACK_CHANNEL }}
          message: Running release build on {{ env.GITHUB_REF_NAME }} branch ${{ job.status }}
        if: always()